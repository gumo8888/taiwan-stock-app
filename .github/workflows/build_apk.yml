name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Generate App Infrastructure
        run: |
          rm -rf *
          flutter create --org com.example --project-name taiwan_stock_app .

          # 1. 建立完美的 Dart 核心主程式 (改用全新的 loadHtmlString 記憶體直接加載機制)
          cat << "EOF" > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(const TaiwanStockApp());

          class TaiwanStockApp extends StatelessWidget {
            const TaiwanStockApp({Key? key}) : super(key: key);
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                theme: ThemeData.dark(),
                home: const StockChartScreen(),
              );
            }
          }

          class StockChartScreen extends StatefulWidget {
            const StockChartScreen({Key? key}) : super(key: key);
            @override
            _StockChartScreenState createState() => _StockChartScreenState();
          }

          class _StockChartScreenState extends State<StockChartScreen> {
            late final WebViewController _webViewController;
            String _currentStockId = "2330";
            String _currentStockName = "台積電";

            final List<Map<String, String>> _stockList = [
              {"id": "2330", "name": "台積電", "symbol": "TWSE:2330"},
              {"id": "2454", "name": "聯發科", "symbol": "TWSE:2454"},
              {"id": "2317", "name": "鴻海", "symbol": "TWSE:2317"},
              {"id": "2603", "name": "長榮", "symbol": "TWSE:2603"},
              {"id": "2882", "name": "國泰金", "symbol": "TWSE:2882"},
            ];

            // 完美的內嵌 HTML 技術分析網頁代碼（直接在記憶體中被 Dart 強制載入，完美避開手機資產權限限制）
            final String _htmlContent = """
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="utf-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                <style>
                    html, body, #tv_chart_container { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #131722; overflow: hidden; }
                </style>
            </head>
            <body>
                <div id="tv_chart_container"></div>
                <script type="text/javascript" src="https://tradingview.com"></script>
                <script type="text/javascript">
                    var widget = null;
                    function createWidget(symbolName) {
                        document.getElementById('tv_chart_container').innerHTML = '';
                        widget = new TradingView.widget({
                            "width": "100%",
                            "height": "100%",
                            "symbol": symbolName,
                            "interval": "D",
                            "timezone": "Asia/Taipei",
                            "theme": "dark",
                            "style": "1",
                            "locale": "zh_TW",
                            "toolbar_bg": "#131722",
                            "enable_publishing": false,
                            "hide_side_toolbar": false,
                            "allow_symbol_change": false,
                            "container_id": "tv_chart_container",
                            "studies": [
                                "MAExp@tv-basicstudies"
                            ]
                        });
                    }
                    function changeTradingViewSymbol(symbolName) {
                        createWidget(symbolName);
                    }
                    window.onload = function() {
                        createWidget("TWSE:2330");
                    };
                </script>
            </body>
            </html>
            """;

            @override
            void initState() {
              super.initState();
              _webViewController = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (String url) {
                      _webViewController.runJavaScript("changeTradingViewSymbol('TWSE:2330')");
                    },
                  ),
                );
              
              // 【核心修正】直接將 HTML 字串當作最高安全級別的線上網頁載入
              _webViewController.loadHtmlString(_htmlContent);
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("$_currentStockId $_currentStockName")),
                drawer: Drawer(
                  child: ListView(
                    padding: EdgeInsets.zero,
                    children: [
                      const DrawerHeader(
                        decoration: BoxDecoration(color: Color(0xFF131722)),
                        child: Center(child: Text("台股自選清單", style: TextStyle(fontSize: 18))),
                      ),
                      ..._stockList.map((stock) => ListTile(
                        title: Text(stock['name']!),
                        subtitle: Text(stock['id']!),
                        selected: stock['id'] == _currentStockId,
                        onTap: () {
                          setState(() {
                            _currentStockId = stock['id']!;
                            _currentStockName = stock['name']!;
                          });
                          _webViewController.runJavaScript("changeTradingViewSymbol('${stock['symbol']}')");
                          Navigator.pop(context);
                        },
                      )),
                    ],
                  ),
                ),
                body: WebViewWidget(controller: _webViewController),
              );
            }
          }
          EOF

          # 2. 建立配置文件 pubspec.yaml (由於採用字串注入，資產宣告可完全清空，編譯乾淨俐落)
          cat << "EOF" > pubspec.yaml
          name: taiwan_stock_app
          description: A professional Taiwan Stock Chart App.
          publish_to: "none"
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.2
          flutter:
            uses-material-design: true
          EOF

          # 3. 寫入基本權放行與最高層級明文流量支援設定
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"\/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taiwan-Stock-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
