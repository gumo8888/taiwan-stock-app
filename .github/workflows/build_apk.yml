name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Re-create with Assets Protection
        run: |
          # 1. 安全暫存您在網頁上建立的兩個核心檔案
          mkdir -p /tmp/backup_lib /tmp/backup_assets
          cp lib/main.dart /tmp/backup_lib/main.dart
          cp assets/chart.html /tmp/backup_assets/chart.html

          # 2. 精準清除舊專案結構（保留 .github 自動化配置）
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.github' ! -name '.git' -exec rm -rf {} +

          # 3. 呼叫官方指令重新生成 100% 正規的 Flutter 專案
          flutter create --org com.example --project-name taiwan_stock_app .

          # 4. 【關鍵修復】在全新結構中強制創建 assets 目錄，並將 K 線引擎與主程式塞回正確路徑
          mkdir -p assets
          cp /tmp/backup_lib/main.dart lib/main.dart
          cp /tmp/backup_assets/chart.html assets/chart.html

          # 5. 重寫配置檔，明確向編譯引擎宣告 assets 網頁路徑，防止卡死
          echo 'name: taiwan_stock_app
          description: A professional Taiwan Stock Chart App.
          publish_to: "none"
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.2
          flutter:
            assets:
              - assets/chart.html' > pubspec.yaml

          # 6. 注入平板與手機必備的網際網路連線權限
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"\/>' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taiwan-Stock-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
