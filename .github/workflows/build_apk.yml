name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Generate App Infrastructure
        run: |
          rm -rf *
          flutter create --org com.example --project-name taiwan_stock_app .

          # 1. 建立最強悍的自動導航防退回主程式
          cat << "EOF" > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(const TaiwanStockApp());

          class TaiwanStockApp extends StatelessWidget {
            const TaiwanStockApp({Key? key}) : super(key: key);
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '台股技術分析專業版',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark(),
                home: const StockChartScreen(),
              );
            }
          }

          class StockChartScreen extends StatefulWidget {
            const StockChartScreen({Key? key}) : super(key: key);
            @override
            _StockChartScreenState createState() => _StockChartScreenState();
          }

          class _StockChartScreenState extends State<StockChartScreen> {
            late final WebViewController _webViewController;
            // 完美的免登入全功能看盤室路徑，預設帶入台積電
            final String _targetUrl = 'https://tradingview.com';

            @override
            void initState() {
              super.initState();
              _webViewController = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                // 模擬完全正規的電腦桌面版身分，逼迫 TradingView 直接吐出全部畫線工具
                ..setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageStarted: (String url) {
                      // 【核心防線】如果網頁試圖跳回任何帶有登入宣傳的首頁，原生 Dart 會強制將網址拉回專用看盤室
                      if (!url.contains('widgetembed')) {
                        _webViewController.loadRequest(Uri.parse(_targetUrl));
                      }
                    },
                    onNavigationRequest: (NavigationRequest request) {
                      if (!request.url.contains('widgetembed')) {
                        _webViewController.loadRequest(Uri.parse(_targetUrl));
                        return NavigationDecision.prevent; // 攔截並中斷錯誤跳轉
                      }
                      return NavigationDecision.navigate;
                    },
                  ),
                )
                ..loadRequest(Uri.parse(_targetUrl));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF131722),
                body: SafeArea(
                  child: WebViewWidget(controller: _webViewController),
                ),
              );
            }
          }
          EOF

          # 2. 建立標準配置文件 pubspec.yaml
          cat << "EOF" > pubspec.yaml
          name: taiwan_stock_app
          description: A professional Taiwan Stock Chart App.
          publish_to: "none"
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.2
          flutter:
            uses-material-design: true
          EOF

          # 3. 網路防火牆徹底放行設定
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"\/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taiwan-Stock-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
