name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Pure Rebuild Environment Creation
        run: |
          # 1. 先將主程式與 K 線網頁存至暫存區
          mkdir -p /tmp/stock_backup
          cp lib/main.dart /tmp/stock_backup/main.dart
          cp assets/chart.html /tmp/stock_backup/chart.html

          # 2. 建立一個全新的、完全乾淨的標準子目錄結構，絕不呼叫刪除指令
          rm -rf lib assets android pubspec.yaml
          flutter create --org com.example --project-name taiwan_stock_app .

          # 3. 移回剛才備份的核心程式碼
          mkdir -p assets
          cp /tmp/stock_backup/main.dart lib/main.dart
          cp /tmp/stock_backup/chart.html assets/chart.html

          # 4. 強制寫入完美無誤的 pubspec.yaml，明確宣告 WebView 與資產路徑
          cat << 'EOF' > pubspec.yaml
          name: taiwan_stock_app
          description: A professional Taiwan Stock Chart App.
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.2
          flutter:
            assets:
              - assets/chart.html
          EOF

          # 5. 強制寫入含有手機連網權限的 Android 清單檔案
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://android.com">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="台股專業畫線App" android:icon="@mipmap/ic_launcher">
                  <activity android:name="io.flutter.embedding.android.FlutterActivity"
                            android:exported="true"
                            android:launchMode="singleTop"
                            android:theme="@style/LaunchTheme"
                            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taiwan-Stock-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
