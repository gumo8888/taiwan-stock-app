name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Auto Re-create Android Infrastructure
        run: |
          # 1. 雲端安全暫存您在網頁上手動儲存的完全體 lib/main.dart 與 pubspec.yaml
          mkdir -p /tmp/backup_core
          [ -f lib/main.dart ] && cp lib/main.dart /tmp/backup_core/main.dart
          [ -f pubspec.yaml ] && cp pubspec.yaml /tmp/backup_core/pubspec.yaml

          # 2. 清除雲端目前缺檔的舊目錄，但絕對保留重要的 .github 自動化配置
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.github' ! -name '.git' -exec rm -rf {} +

          # 3. 呼叫官方命令，在雲端一秒初始化一個 100% 結構完整、絕不報錯的正規看盤空殼專案
          flutter create --org com.example --project-name taiwan_stock_app .

          # 4. 將您寫好的完全體核心主程式與設定檔精準還原覆蓋進去
          [ -f /tmp/backup_core/main.dart ] && cp /tmp/backup_core/main.dart lib/main.dart
          [ -f /tmp/backup_core/pubspec.yaml ] && cp /tmp/backup_core/pubspec.yaml pubspec.yaml

          # 5. 自動修改全新生成的 Android 清單檔案，注入手機與平板必備的明文連網放行權限
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"\/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build Pure Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taiwan-Stock-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
