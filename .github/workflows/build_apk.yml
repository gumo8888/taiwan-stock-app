name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Robust Re-create with Assets Protection
        run: |
          # 1. 建立安全暫存目錄
          mkdir -p /tmp/backup_lib /tmp/backup_assets

          # 2. 安全檢查並備份主程式與 K 線網頁（即使路徑不存在也不會報錯）
          if [ -f lib/main.dart ]; then cp lib/main.dart /tmp/backup_lib/; fi
          if [ -f assets/chart.html ]; then cp assets/chart.html /tmp/backup_assets/; fi

          # 3. 精準清除舊有的殘缺結構，但絕對保留重要的 .github 腳本目錄
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.github' ! -name '.git' -exec rm -rf {} +

          # 4. 讓 Flutter 重新初始化一個最標準、絕不報錯的官方專案範本
          flutter create --org com.example --project-name taiwan_stock_app .

          # 5. 強制創建 assets 目錄，並將您的 K 線網頁與主程式覆蓋回去標準結構
          mkdir -p assets
          if [ -f /tmp/backup_lib/main.dart ]; then cp /tmp/backup_lib/main.dart lib/; fi
          if [ -f /tmp/backup_assets/chart.html ]; then cp /tmp/backup_assets/chart.html assets/; fi

          # 6. 重新覆寫標準的 pubspec.yaml，確保外部套件與資產路徑正確
          echo 'name: taiwan_stock_app
          description: A professional Taiwan Stock Chart App.
          publish_to: "none"
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.2
          flutter:
            assets:
              - assets/chart.html' > pubspec.yaml

          # 7. 修改剛建立好的標準設定檔，強制加入手機與平板的網路權限
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"\/>' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taiwan-Stock-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
