name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Generate App Infrastructure
        run: |
          rm -rf *
          flutter create --org com.example --project-name taiwan_stock_app .

          # 1. 建立完美的 Dart 核心主程式 (使用 "EOF" 鎖定，100% 防止錢字號被誤吞)
          cat << "EOF" > lib/main.dart
          import 'dart:convert';
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:http/http.dart' as http;

          void main() => runApp(const TaiwanStockApp());

          class TaiwanStockApp extends StatelessWidget {
            const TaiwanStockApp({Key? key}) : super(key: key);
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                theme: ThemeData.dark(),
                home: const StockChartScreen(),
              );
            }
          }

          class StockChartScreen extends StatefulWidget {
            const StockChartScreen({Key? key}) : super(key: key);
            @override
            _StockChartScreenState createState() => _StockChartScreenState();
          }

          class _StockChartScreenState extends State<StockChartScreen> {
            late final WebViewController _webViewController;
            bool _isDrawingMode = false;
            bool _isPageFinished = false;
            String _currentStockId = "2330";
            String _currentStockName = "台積電";

            final List<Map<String, String>> _stockList = [
              {"id": "2330", "name": "台積電"},
              {"id": "2454", "name": "聯發科"},
              {"id": "2317", "name": "鴻海"},
              {"id": "2603", "name": "長榮"},
              {"id": "2882", "name": "國泰金"},
            ];

            @override
            void initState() {
              super.initState();
              _webViewController = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (String url) {
                      _isPageFinished = true;
                      _fetchAndInjectStock(_currentStockId);
                    },
                  ),
                )
                ..loadFlutterAsset('assets/chart.html');
            }

            Future<void> _fetchAndInjectStock(String stockId) async {
              if (!_isPageFinished) return;
              final currentYear = DateTime.now().year;
              final url = Uri.parse('https://finmindtrade.com');
              
              try {
                final response = await http.get(url);
                if (response.statusCode == 200) {
                  final List resData = json.decode(response.body)['data'];
                  final formattedData = resData.map((item) => {
                    'time': item['date'],
                    'open': item['open'],
                    'high': item['max'],
                    'low': item['min'],
                    'close': item['close']
                  }).toList();

                  final jsonString = json.encode(formattedData);
                  _webViewController.runJavaScript("renderChartData('$jsonString')");
                }
              } catch (e) {
                debugPrint("抓取個股失敗: $e");
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("$_currentStockId $_currentStockName")),
                drawer: Drawer(
                  child: ListView(
                    padding: EdgeInsets.zero,
                    children: [
                      const DrawerHeader(
                        decoration: BoxDecoration(color: Color(0xFF131722)),
                        child: Center(child: Text("台股自選清單", style: TextStyle(fontSize: 18))),
                      ),
                      ..._stockList.map((stock) => ListTile(
                        title: Text(stock['name']!),
                        subtitle: Text(stock['id']!),
                        selected: stock['id'] == _currentStockId,
                        onTap: () {
                          setState(() {
                            _currentStockId = stock['id']!;
                            _currentStockName = stock['name']!;
                            _isDrawingMode = false;
                          });
                          _fetchAndInjectStock(_currentStockId);
                          _webViewController.runJavaScript("setDrawingMode(false)");
                          Navigator.pop(context);
                        },
                      )),
                    ],
                  ),
                ),
                body: Column(
                  children: [
                    Expanded(child: WebViewWidget(controller: _webViewController)),
                    Container(
                      padding: const EdgeInsets.all(16.0),
                      color: Colors.black,
                      child: SafeArea(
                        child: Row(
                          children: [
                            ElevatedButton(
                              style: ElevatedButton.styleFrom(backgroundColor: _isDrawingMode ? Colors.red : Colors.grey),
                              onPressed: () {
                                setState(() { _isDrawingMode = !_isDrawingMode; });
                                _webViewController.runJavaScript("setDrawingMode($_isDrawingMode, 'line', '#d63031', 2)");
                              },
                              child: Text(_isDrawingMode ? "關閉畫線" : "開啟畫線"),
                            ),
                          ],
                        ),
                      ),
                    )
                  ],
                ),
              );
            }
          }
          EOF

          # 2. 建立網頁資產檔案 (assets/chart.html)
          mkdir -p assets
          cat << "EOF" > assets/chart.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <script src="https://unpkg.com"></script>
              <style>
                  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #131722; overflow: hidden; position: relative; }
                  #chart { width: 100%; height: 100%; z-index: 1; }
                  #drawingCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
                  .active-canvas { pointer-events: auto !important; }
              </style>
          </head>
          <body>
              <div id="chart"></div>
              <canvas id="drawingCanvas"></canvas>
              <script>
                  var chart = LightweightCharts.createChart(document.getElementById('chart'), {
                      layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
                      grid: { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
                      timeScale: { borderColor: '#485c7b' }
                  });
                  var candlestickSeries = chart.addCandlestickSeries({ upColor: '#ef5350', downColor: '#26a69a' });
                  var ma5Series = chart.addLineSeries({ color: '#f5cd79', lineWidth: 1 });

                  function renderChartData(jsonString) {
                      var formattedData = JSON.parse(jsonString);
                      candlestickSeries.setData(formattedData);
                      
                      let ma5Data = [];
                      for (let i = 0; i < formattedData.length; i++) {
                          if (i < 4) continue;
                          let sum = 0;
                          for (let j = 0; j < 5; j++) { sum += formattedData[i - j].close; }
                          ma5Data.push({ time: formattedData[i].time, value: sum / 5 });
                      }
                      ma5Series.setData(ma5Data);
                      chart.timeScale().fitContent();
                  }

                  var canvas = document.getElementById('drawingCanvas');
                  var ctx = canvas.getContext('2d');
                  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
                  window.addEventListener('resize', resizeCanvas);
                  setTimeout(resizeCanvas, 300);

                  var shapes = []; var isDrawingMode = false; var currentMode = 'line';
                  var config = { color: '#d63031', width: 2 };
                  var startPoint = null; var tempShape = null;

                  function setDrawingMode(enable, mode, color, width) {
                      isDrawingMode = enable; currentMode = mode || currentMode;
                      if(color) config.color = color; if(width) config.width = parseInt(width);
                      if(enable) { canvas.classList.add('active-canvas'); chart.applyOptions({ handleScroll: false, handleScale: false }); }
                      else { canvas.classList.remove('active-canvas'); chart.applyOptions({ handleScroll: true, handleScale: true }); }
                  }

                  canvas.addEventListener('touchstart', (e) => {
                      if (!isDrawingMode) return;
                      var touch = e.touches;
                      startPoint = { x: touch.clientX, y: touch.clientY };
                  });

                  canvas.addEventListener('touchmove', (e) => {
                      if (!isDrawingMode || !startPoint) return;
                      var touch = e.touches;
                      tempShape = { type: currentMode, x1: startPoint.x, y1: startPoint.y, x2: touch.clientX, y2: touch.clientY, color: config.color, width: config.width };
                      redrawAll();
                      drawShape(ctx, tempShape);
                  });

                  canvas.addEventListener('touchend', () => {
                      if (tempShape) { shapes.push(tempShape); tempShape = null; }
                      startPoint = null; redrawAll();
                  });

                  function drawShape(context, s) {
                      context.beginPath(); context.strokeStyle = s.color; context.lineWidth = s.width;
                      context.moveTo(s.x1, s.y1); context.lineTo(s.x2, s.y2); context.stroke();
                  }

                  function redrawAll() { ctx.clearRect(0, 0, canvas.width, canvas.height); shapes.forEach(s => drawShape(ctx, s)); }
                  function clearAllLines() { shapes = []; redrawAll(); }
              </script>
          </body>
          </html>
          EOF

          # 3. 覆寫配置文件 pubspec.yaml
          cat << "EOF" > pubspec.yaml
          name: taiwan_stock_app
          description: A professional Taiwan Stock Chart App.
          publish_to: "none"
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.2
            http: ^1.1.0
          flutter:
            assets:
              - assets/chart.html
          EOF

          # 4. 寫入手機、平板連網基本權限與防止黑屏白名單設定
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"\/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taiwan-Stock-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
