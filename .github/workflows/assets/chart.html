<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #131722; overflow: hidden; position: relative; }
        #chart { width: 100vw; height: 100vh; z-index: 1; }
        #drawingCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        .active-canvas { pointer-events: auto !important; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <canvas id="drawingCanvas"></canvas>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
            timeScale: { borderColor: '#485c7b' }
        });
        const candlestickSeries = chart.addCandlestickSeries({ upColor: '#ef5350', downColor: '#26a69a' });
        const ma5Series = chart.addLineSeries({ color: '#f5cd79', lineWidth: 1 });

        // 直接在前端網頁異步調用公開 API 撈取技術 K 線，完美繞過手機原生平台網路限制
        async function changeStock(stockId) {
            const currentYear = new Date().getFullYear();
            const url = `https://finmindtrade.com{stockId}&start_date=${currentYear}-01-01`;
            try {
                const response = await fetch(url);
                const resData = await response.json();
                const formattedData = resData.data.map(item => ({
                    time: item.date, open: item.open, high: item.max, low: item.min, close: item.close
                }));
                candlestickSeries.setData(formattedData);
                
                // 計算五日 MA
                let ma5Data = [];
                for (let i = 0; i < formattedData.length; i++) {
                    if (i < 4) continue;
                    let sum = 0;
                    for (let j = 0; j < 5; j++) { sum += formattedData[i - j].close; }
                    ma5Data.push({ time: formattedData[i].time, value: sum / 5 });
                }
                ma5Series.setData(ma5Data);
                chart.timeScale().fitContent();
            } catch (e) { console.error(e); }
        }

        // ====== Canvas 專業手勢畫線邏輯 ======
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 500);

        let shapes = []; let isDrawingMode = false; let currentMode = 'line';
        let config = { color: '#d63031', width: 2, style: 'solid', textSize: 16 };
        let startPoint = null; let tempShape = null;

        function setDrawingMode(enable, mode, color, width, style, textSize) {
            isDrawingMode = enable; currentMode = mode || currentMode;
            if(color) config.color = color; if(width) config.width = parseInt(width);
            if(enable) { canvas.classList.add('active-canvas'); chart.applyOptions({ handleScroll: false, handleScale: false }); }
            else { canvas.classList.remove('active-canvas'); chart.applyOptions({ handleScroll: true, handleScale: true }); }
        }

        canvas.addEventListener('touchstart', (e) => {
            if (!isDrawingMode) return;
            const touch = e.touches[0];
            startPoint = { x: touch.clientX, y: touch.clientY };
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawingMode || !startPoint) return;
            const touch = e.touches[0];
            tempShape = { type: currentMode, x1: startPoint.x, y1: startPoint.y, x2: touch.clientX, y2: touch.clientY, color: config.color, width: config.width };
            redrawAll();
            drawShape(ctx, tempShape);
        });

        canvas.addEventListener('touchend', () => {
            if (tempShape) { shapes.push(tempShape); tempShape = null; }
            startPoint = null; redrawAll();
        });

        function drawShape(context, s) {
            context.beginPath(); context.strokeStyle = s.color; context.lineWidth = s.width;
            context.moveTo(s.x1, s.y1); context.lineTo(s.x2, s.y2); context.stroke();
        }

        function redrawAll() { ctx.clearRect(0, 0, canvas.width, canvas.height); shapes.forEach(s => drawShape(ctx, s)); }
        function clearAllLines() { shapes = []; redrawAll(); }
    </script>
</body>
</html>
